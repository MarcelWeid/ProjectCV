# ProjectCV — Postgres + pgvector for local development.
# In production (Phase 5), the same file is deployed to the Hetzner VM
# with different .env values.

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: projectcv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-projectcv}
      POSTGRES_USER: ${POSTGRES_USER:-projectcv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectcv} -d ${POSTGRES_DB:-projectcv}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
    name: projectcv-db-data
